events {
    worker_connections 1024;
}

http {
    upstream rag_workers {
        # Nginx auto-discovers scaled worker containers
        # Each worker runs the FastAPI RAG engine on port 8000
        # Round-robin load balancing by default
        server worker:8000;
    }

    server {
        listen 80;

        # REST endpoints
        location / {
            proxy_pass http://rag_workers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
        }

        # WebSocket endpoint
        location /ws/ {
            proxy_pass http://rag_workers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Health check endpoint (not load balanced)
        location /nginx-health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
